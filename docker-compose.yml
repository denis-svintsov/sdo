services:
  postgres:
    image: postgres:15-alpine
    container_name: sdo-postgres
    environment:
      POSTGRES_USER: sdo_user
      POSTGRES_PASSWORD: sdo_password
      POSTGRES_DB: sdo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdo_user -d sdo_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdo-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sdo-frontend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://sdo_user:sdo_password@postgres:5432/sdo_db
      NODE_ENV: development
      PORT: 5000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sdo-network

  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    container_name: sdo-auth
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sdo_db
      SPRING_DATASOURCE_USERNAME: sdo_user
      SPRING_DATASOURCE_PASSWORD: sdo_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sdo-network

volumes:
  postgres_data:

networks:
  sdo-network:
    driver: bridge


