spring.application.name=communication
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sdo_communication_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sdo_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sdo_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=communication

spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.create-schemas=true
spring.flyway.schemas=communication
spring.flyway.default-schema=communication
spring.flyway.locations=classpath:db/migration

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

app.websocket.allowed-origins=${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:5000}
