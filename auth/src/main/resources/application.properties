spring.application.name=auth-service

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sdo_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sdo_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sdo_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=users
spring.jpa.properties.hibernate.schema=users

# Server
server.port=8080

# JWT
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationThatShouldBeAtLeast256BitsLong}
jwt.expiration=86400000

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.example.auth=DEBUG


