spring.application.name=users
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sdo_users_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sdo_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sdo_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=users

spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.create-schemas=true
spring.flyway.schemas=users
spring.flyway.default-schema=users
spring.flyway.locations=classpath:db/migration

# Downstream services
courses.service.url=${COURSES_SERVICE_URL:http://localhost:8081}
