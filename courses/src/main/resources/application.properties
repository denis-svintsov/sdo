spring.application.name=courses-service

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sdo_courses_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sdo_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sdo_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=courses
spring.jpa.properties.hibernate.schema=courses

spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.create-schemas=true
spring.flyway.schemas=courses
spring.flyway.default-schema=courses
spring.flyway.locations=classpath:db/migration

# Server
server.port=8081

# Kafka (configure via environment in real deployments)
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Redis cache
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

# Users service (for user context instead of direct DB access)
users.service.url=${USERS_SERVICE_URL:http://localhost:8080}

# Logging
logging.level.org.springframework=INFO
logging.level.org.example.courses=DEBUG
