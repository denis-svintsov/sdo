spring.application.name=courses-service

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sdo_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sdo_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sdo_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=courses
spring.jpa.properties.hibernate.schema=courses

# Server
server.port=8081

# Kafka (configure via environment in real deployments)
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Redis cache
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

# Logging
logging.level.org.springframework=INFO
logging.level.org.example.courses=DEBUG
