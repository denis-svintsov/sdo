server:
  port: 8080

spring:
  application:
    name: api-gateway
  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      httpclient:
        connect-timeout: 2000
        response-timeout: 5s
      default-filters:
        - name: RequestRateLimiter
          args:
            key-resolver: "#{@keyResolver}"
            redis-rate-limiter.replenishRate: ${GATEWAY_RATE_REPLENISH:50}
            redis-rate-limiter.burstCapacity: ${GATEWAY_RATE_BURST:100}
            redis-rate-limiter.requestedTokens: 1
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - ${CORS_ALLOWED_ORIGINS:http://localhost:5000}
              - http://localhost:*
              - http://127.0.0.1:*
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://auth:8080}
          predicates:
            - Path=/auth/**
          filters:
            - RewritePath=/auth/(?<segment>.*), /api/auth/${segment}
        - id: users-service
          uri: ${USER_SERVICE_URL:http://users:8080}
          predicates:
            - Path=/users/**
        - id: courses-service
          uri: ${COURSES_SERVICE_URL:http://courses:8081}
          predicates:
            - Path=/courses/**
        - id: communication-service
          uri: ${COMMUNICATION_SERVICE_URL:http://communication:8080}
          predicates:
            - Path=/chat/**
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://notifications:8080}
          predicates:
            - Path=/notifications/**
        - id: analytics-service
          uri: ${ANALYTICS_SERVICE_URL:http://analytics:8080}
          predicates:
            - Path=/analytics/**
      redis-rate-limiter:
        replenish-rate: ${GATEWAY_RATE_REPLENISH:50}
        burst-capacity: ${GATEWAY_RATE_BURST:100}
        requested-tokens: 1

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://auth:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.client: WARN
